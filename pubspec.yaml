name: proect_chimie
description: Aplicatie web Flutter cu control Android via Firebase

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_database: ^11.0.0
  flutter_animate: ^4.5.0
  qr_flutter: ^4.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
    - assets/